version: 2

build:
  os: ubuntu-24.04
  tools:
    python: latest
  jobs:
    install:
      - pip install zensical mkdocstrings mkdocstrings-python
    build:
      html:
        - cd docs-py && zensical build
    post_build:
      - mkdir -p $READTHEDOCS_OUTPUT/html/
      - cp --recursive docs-py/site/* $READTHEDOCS_OUTPUT/html/
